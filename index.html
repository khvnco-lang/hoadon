<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Store App - Final (FIX A6)</title>
    <style>
        * { -webkit-tap-highlight-color: transparent !important; outline: none !important; box-sizing: border-box; }
        html, body { background-color: #000000; margin: 0; padding: 0; height: 100%; overflow: hidden; color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { display: flex; flex-direction: column; }

        .header-fixed { padding: 15px; background: #000; z-index: 10; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #222; }
        .calendar-trigger { font-size: 26px; cursor: pointer; background: #1C1C1E; padding: 8px 12px; border-radius: 15px; border: 1.5px solid #0A84FF; }
        .total-summary { display: flex; align-items: center; gap: 12px; flex: 1; margin-left: 15px; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 9px; color: #8E8E93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .divider { width: 1px; height: 22px; background: #333; }
        .header-actions { display: flex; align-items: center; gap: 10px; }
        .btn-print-trigger { font-size: 22px; cursor: pointer; background: #1C1C1E; padding: 5px 10px; border-radius: 12px; border: 1px solid #333; }
        .btn-submit { background: transparent; border: 1.5px solid #0A84FF; color: #0A84FF; padding: 10px 18px; border-radius: 20px; font-weight: 700; font-size: 13px; white-space: nowrap; cursor: pointer; }

        .search-container { padding: 10px 15px; background: #000; }
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-input { width: 100%; background: #1C1C1E; border: none; border-radius: 10px; padding: 10px 15px 10px 35px; color: #fff; font-size: 14px; }
        .search-icon { position: absolute; left: 10px; color: #8E8E93; font-size: 14px; }

        .scrollable-content { flex: 1; overflow-y: auto; padding: 10px 15px 100px 15px; -webkit-overflow-scrolling: touch; }
        #order-list { list-style: none; padding: 0; margin: 0; }
        li { background: #111111; margin-bottom: 12px; padding: 16px; border-radius: 20px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: flex-end; }
        .store-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: #fff; }
        .coords-text { font-size: 12px; color: #8E8E93; margin-bottom: 4px; }
        .meta-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #0A84FF; font-weight: 500; }
        .right-content { display: flex; gap: 10px; }
        .info-box { width: 50px; height: 50px; background: #1C1C1E; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #333; }
        .label { font-size: 8px; color: #0A84FF; font-weight: 800; margin-bottom: 2px; }
        .value { font-size: 14px; font-weight: 800; }

        /* VIEWER HÓA ĐƠN (FIX SCROLL) */
        #invoice-viewer { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #F2F2F7; display: none; z-index: 1100; overflow-y: auto; overflow-x: hidden; padding: 20px; }
        #invoice-list-container { display: flex; flex-direction: column; align-items: center; min-width: 155mm; }
        .invoice-page { width: 148mm; height: 105mm; padding: 8mm; overflow: hidden; background: #fff; color: #000; margin: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-family: Arial, sans-serif; flex-shrink: 0; position: relative; page-break-after: always; break-after: page; page-break-inside: avoid; }
        .inv-title { font-size: 22px; font-weight: bold; text-align: center; flex: 1; text-transform: uppercase; }
        .inv-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 11px; }
        .inv-table th, .inv-table td { border: 1px solid #000; padding: 4px; text-align: center; }
        .inv-table tr:first-child,
.inv-table tr:last-child {
    background: transparent !important;
}

.inv-table tr:first-child td,
.inv-table tr:last-child td,
.inv-table tr:first-child th,
.inv-table tr:last-child th {
    background: transparent !important;
}

        .btn-exit-viewer { position: fixed; bottom: 25px; left: 25px; background: #FF3B30; color: #fff; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; z-index: 1200; cursor: pointer; }
        .btn-print-action { position: fixed; bottom: 25px; right: 25px; background: #34C759; color: #fff; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; z-index: 1200; cursor: pointer; }

        /* FIX IN A6 NGANG */
        @page { size: A6 landscape; margin: 0; }

        @media print {
            html, body { width: 148mm; margin: 0; padding: 0; overflow: visible !important; }
            body * { visibility: hidden; }
            #invoice-viewer, #invoice-viewer * { visibility: visible; }
            #invoice-viewer { position: absolute; left: 0; top: 0; width: 100%; background: #fff !important; padding: 0 !important; overflow: visible !important; }
            .invoice-page { width: 148mm; height: 105mm; margin: 0; page-break-after: always; break-after: page; page-break-inside: avoid; }
            .btn-exit-viewer, .btn-print-action { display: none !important; }
        }

        .full-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .popup-box { background: #121212; width: 92%; max-width: 360px; border-radius: 28px; padding: 22px; border: 1px solid #222; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-bottom: 20px; background: #1c1c1e; padding: 12px; border-radius: 18px; border: 1px solid #222; }
        .weekday { font-size: 10px; color: #8E8E93; font-weight: bold; padding-bottom: 8px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 50%; position: relative; }
        .day.has-data { color: #fff; cursor: pointer; }
        .day.not-in-data { color: #3A3A3C; pointer-events: none; }
        .day.selected { background: #0A84FF !important; color: white !important; font-weight: bold; }
        .day.has-data::after { content: ''; position: absolute; bottom: 4px; width: 3px; height: 3px; background: #555; border-radius: 50%; }

        .stats-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 13px; color: white; }
        .stats-table th { color: #8E8E93; font-weight: 500; padding: 8px 5px; text-align: left; border-bottom: 0.5px solid #222; font-size: 10px; text-transform: uppercase; }
        .stats-table td { padding: 12px 5px; border-bottom: 0.5px solid #1a1a1a; }
        .btn-close { width: 100%; background: #FF3B30; color: #fff; border: none; padding: 15px; border-radius: 18px; font-weight: 700; font-size: 16px; margin-top: 10px; cursor: pointer; }

        .alert-box { background: #1C1C1E; width: 270px; border-radius: 14px; text-align: center; border: 0.5px solid #333; overflow: hidden; animation: iosPop 0.2s ease-out; }
        @keyframes iosPop { from { transform: scale(1.15); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .alert-btns { display: flex; border-top: 0.5px solid #333; }
        .alert-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #0A84FF; font-size: 17px; cursor: pointer; }
        #successToast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.1); backdrop-filter: blur(25px); padding: 30px; border-radius: 35px; display: none; z-index: 2000; text-align: center; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="calendar-trigger" onclick="togglePopup(true)">📅</div>
        <div class="total-summary">
            <div class="stat-item"><span class="stat-label">Khách</span><b id="count-val" style="color: #0A84FF; font-size: 17px;">0</b></div>
            <div class="divider"></div>
            <div class="stat-item"><span class="stat-label">Tổng lố</span><b id="sum-ds-val" style="color: #FFD60A; font-size: 17px;">0</b></div>
        </div>
        <div class="header-actions">
            <div class="btn-print-trigger" onclick="generateAllInvoices()">🖨️</div>
            <button class="btn-submit" onclick="submitData()">Khai báo +</button>
        </div>
    </div>

    <div class="search-container">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-input" placeholder="Tìm tên cửa hàng..." oninput="updateDisplay()">
        </div>
    </div>

    <div class="scrollable-content">
        <div id="loading" style="text-align:center; padding:40px; color:#8E8E93;">⏳ Đang đồng bộ...</div>
        <ul id="order-list"></ul>
    </div>

    <!-- VIEWER HÓA ĐƠN -->
    <div id="invoice-viewer">
        <button class="btn-exit-viewer" onclick="closeViewer()">Đóng xem đơn</button>
        <button class="btn-print-action" onclick="window.print()">🖨️ In PDF</button>
        <div id="invoice-list-container"></div>
    </div>

    <!-- POPUP LỊCH & THỐNG KÊ -->
    <div class="full-overlay" id="fullPopup">
        <div class="popup-box">
            <div style="font-size:18px; font-weight:700; margin-bottom:15px; color: white;">Tổng chi tiết</div>
            <div class="calendar-grid" id="calendarGrid">
                <div class="weekday">T2</div><div class="weekday">T3</div><div class="weekday">T4</div>
                <div class="weekday">T5</div><div class="weekday">T6</div><div class="weekday">T7</div><div class="weekday">CN</div>
            </div>
            <table class="stats-table">
                <thead><tr><th style="width: 40%;">MSNV</th><th style="text-align:center;">Khách</th><th style="text-align:center;">DS</th><th style="text-align:center;">KM</th></tr></thead>
                <tbody id="stats-body"></tbody>
            </table>
            <button class="btn-close" onclick="togglePopup(false)">Đóng</button>
        </div>
    </div>

    <!-- ALERT XÁC NHẬN -->
    <div class="full-overlay" id="iosAlert">
        <div class="alert-box">
            <div class="alert-content" style="padding: 20px; color: white;">
                <div style="font-size:17px;font-weight:600;" id="alertTitle">Xác nhận</div>
                <div style="font-size:13px;margin-top:5px;" id="alertMsg"></div>
            </div>
            <div class="alert-btns">
                <button class="alert-btn" onclick="closeAlert()">Hủy</button>
                <button class="alert-btn" style="font-weight:600;border-left:0.5px solid #333;" id="alertConfirmBtn">Đồng ý</button>
            </div>
        </div>
    </div>

    <div id="successToast"><span style="font-size:50px;display:block;margin-bottom:10px;">✅</span><div style="font-weight:700;font-size:17px;color: white;">Thành công</div></div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/1brtLdmHrER-m9nSGgInMLCYTwOqRpLbWO-sucC1G9v0/gviz/tq?tqx=out:csv&sheet=1.GHI HÀNG&tq=SELECT B, C, H, I, F, G WHERE H > 0 ORDER BY F ASC, O ASC  &headers=1";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxiWwpN2AcUriTAwBaU7E9FGtkQfekxvWxoyfAtxe61UMDe5rkcRXsApNUghfvrhRJZ/exec";

        let allData = []; let selectedDates = new Set(); let datesInCSV = new Set();
        let currentFilteredData = [];

        async function loadData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').filter(r => r.trim() !== "");
                rows.shift(); allData = []; datesInCSV.clear();
                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    if (cols.length >= 6) {
                        allData.push({ name: cols[0], coords: cols[1], ds: parseFloat(cols[2]) || 0, km: parseFloat(cols[3]) || 0, msnv: cols[4], date: cols[5] });
                        datesInCSV.add(cols[5]);
                    }
                });
                initCalendar(); updateDisplay();
            } catch (e) { document.getElementById("loading").innerText = "Lỗi kết nối!"; }
        }

        function initCalendar() {
            const grid = document.getElementById("calendarGrid");
            const weekdays = grid.querySelectorAll('.weekday');
            grid.innerHTML = ''; weekdays.forEach(w => grid.appendChild(w));
            for (let i = 0; i < 2; i++) grid.appendChild(document.createElement('div'));
            for (let d = 1; d <= 30; d++) {
                const dayEl = document.createElement('div'); dayEl.className = 'day'; dayEl.innerText = d;
                const dStr = `${d}/4/2026`, dStrFull = `${d < 10 ? '0'+d : d}/04/2026`;
                const fDate = datesInCSV.has(dStr) ? dStr : (datesInCSV.has(dStrFull) ? dStrFull : null);
                if (fDate) {
                    dayEl.classList.add('has-data');
                    dayEl.onclick = (e) => {
                        e.stopPropagation();
                        if (selectedDates.has(fDate)) selectedDates.delete(fDate); else selectedDates.add(fDate);
                        updateDisplay();
                        document.querySelectorAll('.day').forEach(day => {
                            const val = day.innerText;
                            const m1 = `${val}/4/2026`, m2 = `${val < 10 ? '0'+val : val}/04/2026`;
                            if (selectedDates.has(m1) || selectedDates.has(m2)) day.classList.add('selected'); else day.classList.remove('selected');
                        });
                    };
                } else dayEl.classList.add('not-in-data');
                grid.appendChild(dayEl);
            }
        }

        function updateDisplay() {
            let listHtml = "", statsHtml = "", stats = {}, totalDS = 0;
            const term = document.getElementById("search-input").value.toLowerCase();
            currentFilteredData = [];
            allData.forEach(item => {
                if ((selectedDates.size === 0 || selectedDates.has(item.date)) && item.name.toLowerCase().includes(term)) {
                    currentFilteredData.push(item);
                    if (!stats[item.msnv]) stats[item.msnv] = { c: 0, d: 0, k: 0 };
                    stats[item.msnv].c++; stats[item.msnv].d += item.ds; stats[item.msnv].k += item.km;
                    totalDS += item.ds;
                    listHtml += `<li><div class="left-content"><div class="store-name">${item.name}</div><div class="coords-text">📍 ${item.coords}</div><div class="meta-row">👤 ${item.msnv} | 📅 ${item.date}</div></div><div class="right-content"><div class="info-box"><div class="label">DS</div><div class="value">${item.ds}</div></div><div class="info-box"><div class="label">KM</div><div class="value">${item.km}</div></div></div></li>`;
                }
            });
            for (let k in stats) {
                statsHtml += `<tr><td>${k}</td><td align="center"><b>${stats[k].c}</b></td><td align="center" style="color:#0A84FF"><b>${stats[k].d}</b></td><td align="center"><b>${stats[k].k}</b></td></tr>`;
            }
            document.getElementById("order-list").innerHTML = listHtml;
            document.getElementById("stats-body").innerHTML = statsHtml || "<tr><td colspan='4' align='center'>Trống</td></tr>";
            document.getElementById("count-val").innerText = currentFilteredData.length;
            document.getElementById("sum-ds-val").innerText = totalDS.toLocaleString();
            document.getElementById("loading").style.display = "none";
            window.currentSend = currentFilteredData.map(i => ["=ROW()", i.name, i.coords, i.ds, i.msnv, i.date]);
        }

        function generateAllInvoices() {
            if (currentFilteredData.length === 0) return;
            let html = "";
            currentFilteredData.forEach(item => {
                const total = item.ds * 86000;
                html += `
                <div class="invoice-page">
                    <div class="inv-header" style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-size:10px;"><b style="display:block;">TLDVNCO</b>0933.29.29.97 - 0933.11.22.08</div>
                        <div class="inv-title" style="font-size: 25px; letter-spacing: 1px; text-align: right;">BÁO GIÁ KHÁCH HÀNG</div>
                    </div>
                    <div style="text-align:right; font-style:italic; font-size:10px; margin:5px 0;">${item.date}</div>
                    <div style="font-size:11px; font-weight:bold; margin-bottom:5px;">
                        <div style="font-size: 15px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase;">${item.name}</div>
                        <div style="display:flex; justify-content:space-between; margin-top:2px;">
                            <div>Sđt:</div><div style="font-style:italic; font-size:10px;">Mã: ${item.msnv}</div>
                        </div>
                    </div>
                    <table class="inv-table">
                        <thead><tr style="background-color: #eeeeee;"><th width="30">STT</th><th>Tên Hàng</th><th width="60">Đơn Vị</th><th width="60">Số Lượng</th><th width="100">Thành Tiền</th></tr></thead>
                        <tbody>
                            <tr><td>1.</td><td>Vớ</td><td>Lô</td><td>${item.ds}</td><td align="right">${total.toLocaleString()} đ</td></tr>
                            <tr><td>2.</td><td>Khuyến Mãi</td><td>Đôi</td><td>${item.km}</td><td></td></tr>
                            <tr style="font-weight:bold;background-color: #eeeeee;"><td colspan="4">Tổng Cộng</td><td align="right">${total.toLocaleString()} đ</td></tr>
                        </tbody>
                    </table>
                    <div class="inv-footer">
                       <div style="font-size: 10px; line-height: 1.1; margin-top: 5px;">
                            <span style="font-weight:bold; font-style:italic;">Chú ý:</span> Nếu lấy hàng Quý khách vui lòng kiểm tra kỹ hàng hóa trước khi nhân viên rời khỏi cửa hàng.
                        </div>
                        <div style="padding-left:30px; margin-top:2px;font-size: 10px;">Nhân viên có trách nhiệm đồng kiểm và trưng bày hàng hóa cho khách hàng.</div>
                    </div>
                </div>`;
            });
            document.getElementById("invoice-list-container").innerHTML = html;
            document.getElementById("invoice-viewer").style.display = "block";
            document.getElementById("btn-pdf").style.display = "block";
        }

        function closeViewer() { document.getElementById("invoice-viewer").style.display = "none"; document.getElementById("btn-pdf").style.display = "none"; }
        function togglePopup(show) { document.getElementById("fullPopup").style.display = show ? "flex" : "none"; }
        function closeAlert() { document.getElementById("iosAlert").style.display = "none"; }
        function submitData() { if (!window.currentSend?.length) return; document.getElementById("alertMsg").innerText = `Khai báo ${window.currentSend.length} khách hàng?`; document.getElementById("alertConfirmBtn").onclick = function() { closeAlert(); executeSend(); }; document.getElementById("iosAlert").style.display = "flex"; }
        async function executeSend() { const btn = document.querySelector(".btn-submit"); btn.innerText = "..."; btn.disabled = true; try { await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(window.currentSend) }); document.getElementById("successToast").style.display = "block"; if (window.navigator?.vibrate) window.navigator.vibrate(200); setTimeout(() => location.reload(), 2000); } catch (e) { alert("Lỗi gửi!"); btn.innerText = "Khai báo +"; btn.disabled = false; } }
        window.onload = loadData;
// ===== THÊM HÀM XUẤT PDF =====
  // ===== JS CỦA BẠN (GIỮ NGUYÊN) =====

  async function exportPDF(){
    const invoices = document.querySelectorAll(".invoice-page");

    const { jsPDF } = window.jspdf; // 👈 QUAN TRỌNG

    const pdf = new jsPDF({
        unit: 'mm',
        format: [148,105],
        orientation: 'landscape'
    });

    for (let i = 0; i < invoices.length; i++) {
        const canvas = await html2canvas(invoices[i], {
            scale: 2,
            useCORS: true
            scrollY: -window.scrollY
        });

        const imgData = canvas.toDataURL("image/jpeg", 1.0);

        if (i > 0) pdf.addPage();

        pdf.addImage(imgData, 'JPEG', 0, 0, 148, 105);
    }

    pdf.save("hoa-don.pdf");
}
</script>

<!-- THƯ VIỆN BẮT BUỘC -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- NÚT PDF -->
<button id="btn-pdf" onclick="exportPDF()" 
style="
display:none;
position: fixed;
bottom: 90px;
right: 25px;
background: #007AFF;
color: #fff;
border: none;
padding: 15px 25px;
border-radius: 30px;
font-weight: bold;
z-index: 1200;
">
📄 Xuất PDF
</button>

</body>
</html>
